<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="BPM" height="273px" preserveAspectRatio="none" style="width:318px;height:273px;background:#FFFFFF;" version="1.1" viewBox="0 0 318 273" width="318px" zoomAndPan="magnify">
  <defs/>
  <g font-family="sans-serif" lengthAdjust="spacing">
    <text fill="#000" font-size="14" font-weight="700" textLength="90.3" x="10" y="20.889">Crash Diagram</text>
    <text fill="#000" font-size="14" textLength="3.85" x="10" y="34.889"> </text>
    <text fill="#000" font-size="14" textLength="268.538" x="10" y="48.889">This diagram is only used to test crash handling.</text>
    <text fill="#000" font-size="14" textLength="3.85" x="10" y="62.889"> </text>
    <text fill="#000" font-size="14" textLength="171.763" x="10" y="76.889">There are three types of crash:</text>
    <text fill="#000" font-size="14" textLength="46.2" x="10" y="90.889">• During</text>
    <text fill="#000" font-size="14" font-weight="700" textLength="45.938" x="56.2" y="90.889">parsing</text>
    <text fill="#000" font-size="14" textLength="46.2" x="10" y="104.889">• During</text>
    <text fill="#000" font-size="14" font-weight="700" textLength="54.6" x="56.2" y="104.889">finalizing</text>
    <text fill="#000" font-size="14" textLength="46.2" x="10" y="118.889">• During</text>
    <text fill="#000" font-size="14" font-weight="700" textLength="49.088" x="56.2" y="118.889">drawing</text>
    <text fill="#000" font-size="14" textLength="3.85" x="10" y="132.889"> </text>
    <text fill="#000" font-size="14" textLength="297.85" x="10" y="146.889">The purpose is to verify that PlantUML error recovery</text>
    <text fill="#000" font-size="14" textLength="297.238" x="10" y="160.889">mechanisms work correctly, using a diagram whose</text>
    <text fill="#000" font-size="14" textLength="132.388" x="10" y="174.889">behavior is predictable</text>
    <text fill="#000" font-size="14" font-style="italic" textLength="65.275" x="142.388" y="174.889">(it crashes)</text>
    <text fill="#000" font-size="14" textLength="3.85" x="207.663" y="174.889">.</text>
    <text fill="#000" font-size="14" textLength="3.85" x="10" y="188.889"> </text>
    <text fill="#000" font-size="14" textLength="244.475" x="10" y="202.889">To do so, you should the following directive:</text>
    <text fill="#000" font-size="14" textLength="4.9" x="10" y="216.889">•</text>
    <text fill="#000" font-family="monospace" font-size="14" textLength="113.663" x="14.9" y="216.889">crash when parsing</text>
    <text fill="#000" font-size="14" textLength="4.9" x="10" y="230.889">•</text>
    <text fill="#000" font-family="monospace" font-size="14" textLength="122.325" x="14.9" y="230.889">crash when finalizing</text>
    <text fill="#000" font-size="14" textLength="4.9" x="10" y="244.889">•</text>
    <text fill="#000" font-family="monospace" font-size="14" textLength="116.813" x="14.9" y="244.889">crash when drawing</text>
    <text fill="#000" font-size="14" textLength="3.85" x="10" y="258.889"> </text>
  </g>
</svg>
