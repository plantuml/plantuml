<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8"/>
	<meta name="viewport" content="width=device-width, initial-scale=1"/>
	<title>PlantUML Playground</title>
	<link rel="icon" href="favicon.svg" type="image/svg+xml"/>
	<link rel="stylesheet" href="main.css">
</head>
<body>

	<header>
		<span class="title">PlantUML Playground</span>

		<a href="https://github.com/plantuml/plantuml" target="_blank" class="icon" title="Visit PlantUML on GitHub">
			<svg viewBox="0 0 24 24" fill="currentColor">
				<path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v 3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
			</svg>
		</a>
	</header>

	<main>
		<textarea id="editor" autocapitalize="none" autocorrect="off" spellcheck="false" placeholder="Start writing...">@startuml
Alice->Bob : Hello
return ok
@enduml</textarea>

		<div id="resize"></div>

		<div class="preview">
			<div id="loading">
				<span class="loading-dot"></span>
				<span class="loading-dot"></span>
				<span class="loading-dot"></span>
			</div>

			<div id="out"></div>
			<div id="status"></div>
			<div class="controls">
				<button id="copy" type="button" title="Copy diagram to clipboard">
					<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
						<rect x="9" y="9" width="13" height="13" rx="2"/>
						<path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
					</svg>
				</button>
				<button id="save" type="button" title="Save diagram">
					<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
						<path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
						<polyline points="7,10 12,15 17,10"/>
						<line x1="12" y1="15" x2="12" y2="3"/>
					</svg>
				</button>
			</div>
		</div>
	</main>

	<script src="plantuml.js"></script>
	<script src="viz-global.js"></script>
	<script src="main.js"></script>
</body>
</html>
