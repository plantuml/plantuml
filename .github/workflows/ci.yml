name: CI

on:
  create:
    tags:
      - '*'
  pull_request:
    types: [ opened, synchronize, reopened ]
    branches: [ master ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  push:
    branches: [ master ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:

  jdk8:
    name: Build & Run with Ant (Java 8)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 8 (Temurin)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '8'

      - name: Ensure Ant present
        run: |
          if ! command -v ant >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y ant
          fi
          ant -version

      - name: Build with Ant
        run: ant -noinput

      - name: Check PlantUML version (expect exit code 16)
        run: |
          set +e
          java -jar plantuml.jar -version
          CODE=$?
          echo "Exit code: $CODE"
          if [ $CODE -ne 16 ]; then
            echo "::error::Unexpected exit code (expected 16, got $CODE)"
            exit 1
          fi
        
      - name: Upload plantuml.jar
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: plantuml-jdk8-jar
          path: plantuml.jar
          if-no-files-found: error
          retention-days: 30 
                 
      - name: Run sample diagram test (ASCII)
        run: |
          echo "Alice -> Bob : it works!" | java -jar plantuml.jar -pipe -ttxt


  workflow_config:
    runs-on: ubuntu-latest
    outputs:
      do_release: ${{ steps.config.outputs.do_release }}
      do_snapshot_release: ${{ steps.config.outputs.do_snapshot_release }}
      pom_version: ${{ steps.config.outputs.pom_version }}
      do_javadoc: ${{ steps.config.outputs.do_javadoc }}
      do_test_linux: ${{ steps.config.outputs.do_test_linux }}
      do_test_windows: ${{ steps.config.outputs.do_test_windows }}
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v6

      - name: Configure workflow
        id: config
        env:
          ACTOR: ${{ github.actor }}
          EVENT_ACTION: ${{ github.event.action }}
          REF_TYPE: ${{ github.event.ref_type }}
          REF: ${{ github.event.ref }}
        run: |
          cat <<-EOF
            ::group::Debug Info
            GITHUB_EVENT_NAME       : '${GITHUB_EVENT_NAME}'
            EVENT_ACTION            : '${EVENT_ACTION}'
            REF_TYPE                : '${REF_TYPE}'
            REF                     : '${REF}'
            ACTOR                   : '${ACTOR}'
            GITHUB_REPOSITORY_OWNER : '${GITHUB_REPOSITORY_OWNER}'
            ::endgroup::
          EOF

          # Do a release when a git tag starting with 'v' has been created by a suitable user.
          # (We match against github.repository_owner as a kludge so that forked repos can release themselves when testing the workflow)
          if [[ "${GITHUB_EVENT_NAME}" == "create" && "${REF_TYPE}" == "tag" && "${REF}" == v* && \
                ( "${ACTOR}" == "arnaudroques" || "${ACTOR}" == "${GITHUB_REPOSITORY_OWNER}" ) \
             ]]; then
            echo "::notice title=::This run will release '${REF}'"
            echo "do_release=true" >> $GITHUB_OUTPUT
            echo "pom_version=${REF#v}"
            echo "pom_version=${REF#v}" >> $GITHUB_OUTPUT # pom_version is the tag without the 'v' prefix
            echo "do_javadoc=true" >> $GITHUB_OUTPUT
            echo "This run will update the Javadoc"

          elif [[ "${GITHUB_EVENT_NAME}" =~ push|workflow_dispatch && "${REF}" == "refs/heads/master" && ( "${ACTOR}" == "arnaudroques" || "${ACTOR}" == "The-Lum" ) ]]; then
            echo "::notice title=::This run will release a snapshot"
            echo "do_snapshot_release=true" >> $GITHUB_OUTPUT
            V=$(perl -ne 'if (/return (\d{6,7});/) {$v=$1} if (/final int beta = (\d+);/) {$b=$1} END{print(substr($v, 0, 1),".", substr($v, 1, 4),"."); if ($b) {print(int(substr($v+1, 5)), "beta", $b);} else {print(int(substr($v, 5)))}}' src/net/sourceforge/plantuml/version/Version.java)
            echo "pom_version=$V-SNAPSHOT"
            echo "pom_version=$V-SNAPSHOT" >> $GITHUB_OUTPUT # pom_version is taken from Version.java
            echo "do_javadoc=true" >> $GITHUB_OUTPUT
            echo "This run will update the Javadoc"

          else
            echo "This run will NOT make a release"
            echo "do_javadoc=false" >> $GITHUB_OUTPUT
            echo "This run will NOT update the Javadoc"
          fi
          echo "do_test_linux=true" >> $GITHUB_OUTPUT
          echo "do_test_windows=false" >> $GITHUB_OUTPUT

  # We run the tests on many OS / Java combinations but also the Compile step because some users build
  # their own jars from source, so it is good for CI to check that is working on all combinations.
  # We split windows and ubuntu because windows is so slow...
  test_linux:
    needs: workflow_config
    strategy:
      fail-fast: false
      matrix:
        java_version: [ 21 ]
        os: [ ubuntu-latest ]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout the repository
        if: needs.workflow_config.outputs.do_test_linux == 'true'
        uses: actions/checkout@v6

      - name: Set up java
        if: needs.workflow_config.outputs.do_test_linux == 'true'
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java_version }}
          distribution: temurin
          cache: gradle

      # Use of `setup-gradle`, see https://github.com/gradle/actions/
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Diagnostic - list vega .puml files
        run: |
          echo "=== Vega .puml files ==="
          find src/test/resources/vega -name '*.puml' | sort | head -50
          echo "..."
          echo "Total .puml: $(find src/test/resources/vega -name '*.puml' | wc -l)"
          echo ""
          echo "=== Vega subdirectories ==="
          find src/test/resources/vega -type d | sort
          echo ""
          echo "=== VegaTest.java exists? ==="
          ls -la src/test/java/test/vega/VegaTest.java || echo 'NOT FOUND'
          echo ""
          echo "=== Test classes (all *Test.java) ==="
          find src/test/java -name '*Test.java' | wc -l
          echo "=== Test classes on disk ==="
          find src/test/java -name '*Test.java' | sort

      - name: Compile
        if: needs.workflow_config.outputs.do_test_linux == 'true'
        run: gradle -q compileJava --no-daemon

      - name: Test
        if: needs.workflow_config.outputs.do_test_linux == 'true'
        run: gradle test --no-daemon -i

      - name: Test Summary
        if: needs.workflow_config.outputs.do_test_linux == 'true' && always()
        run: |
          echo "::group::Test Results"
          passed=0; failed=0; skipped=0; errors=0
          for f in build/test-results/test/TEST-*.xml; do
            [ -f "$f" ] || continue
            t=$(grep -o 'tests="[0-9]*"'    "$f" | head -1 | grep -o '[0-9]*')
            s=$(grep -o 'skipped="[0-9]*"'  "$f" | head -1 | grep -o '[0-9]*')
            fl=$(grep -o 'failures="[0-9]*"' "$f" | head -1 | grep -o '[0-9]*')
            e=$(grep -o 'errors="[0-9]*"'   "$f" | head -1 | grep -o '[0-9]*')
            passed=$((passed + ${t:-0} - ${s:-0} - ${fl:-0} - ${e:-0}))
            failed=$((failed + ${fl:-0}))
            skipped=$((skipped + ${s:-0}))
            errors=$((errors + ${e:-0}))
          done
          total=$((passed + failed + skipped + errors))
          echo "==========================================="
          echo " Tests run:    $total"
          echo " Passed:       $passed"
          echo " Skipped:      $skipped"
          echo " Failed:       $failed"
          echo " Errors:       $errors"
          echo "==========================================="
          echo "::endgroup::"
          # Also write to GitHub Job Summary
          echo "## Test Results"                                >> $GITHUB_STEP_SUMMARY
          echo "| Metric   | Count |"                          >> $GITHUB_STEP_SUMMARY
          echo "|----------|------:|"                          >> $GITHUB_STEP_SUMMARY
          echo "| Total    | $total |"                         >> $GITHUB_STEP_SUMMARY
          echo "| :white_check_mark: Passed  | $passed |"      >> $GITHUB_STEP_SUMMARY
          echo "| :fast_forward: Skipped | $skipped |"         >> $GITHUB_STEP_SUMMARY
          echo "| :x: Failed  | $failed |"                     >> $GITHUB_STEP_SUMMARY
          echo "| :boom: Errors  | $errors |"                  >> $GITHUB_STEP_SUMMARY
          if [ "$skipped" -gt 0 ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Skipped Tests" >> $GITHUB_STEP_SUMMARY
            for f in build/test-results/test/TEST-*.xml; do
              [ -f "$f" ] || continue
              grep '<testcase ' "$f" | while read -r line; do
                if echo "$line" | grep -q 'skipped'; then
                  name=$(echo "$line" | grep -o 'name="[^"]*"' | head -1 | sed 's/name="//;s/"//')
                  class=$(echo "$line" | grep -o 'classname="[^"]*"' | head -1 | sed 's/classname="//;s/"//')
                  echo "- \`${class}.${name}\`" >> $GITHUB_STEP_SUMMARY
                fi
              done
            done
          fi
          if [ "$failed" -gt 0 ] || [ "$errors" -gt 0 ]; then
            echo "::error::There are test failures or errors"
          fi
          if [ "$skipped" -gt 0 ]; then
            echo "::warning::$skipped test(s) were skipped"
          fi
          # Vega test summary
          VEGA_SUMMARY="src/test/resources/vega/vega-summary.txt"
          if [ -f "$VEGA_SUMMARY" ]; then
            echo "::group::Vega Test Results"
            cat "$VEGA_SUMMARY"
            echo "::endgroup::"
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "## Vega Test Results" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat "$VEGA_SUMMARY" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "::warning::vega-summary.txt not found — Vega tests may not have run"
          fi

      - name: Upload test reports
        uses: actions/upload-artifact@v7
        if: needs.workflow_config.outputs.do_test_linux == 'true'
        with:
          # Using github.run_number here to reduce confusion when downloading & comparing from several builds
          name: ${{ github.run_number }}-${{ matrix.os }}-java-${{ matrix.java_version }}-test-reports
          path: build/reports/tests/

      - name: Upload Vega test results
        uses: actions/upload-artifact@v7
        if: needs.workflow_config.outputs.do_test_linux == 'true' && always()
        with:
          name: vega-results
          path: src/test/resources/vega/vega.json
          if-no-files-found: warn
          retention-days: 30


  build_artifacts:
    needs: [ workflow_config ]
    runs-on: ubuntu-latest
    outputs:
      release_version: ${{ steps.version.outputs.release_version }}
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v6
      - name: Set up java
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin
          cache: gradle
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
#      - name: Set version in gradle.properties
#        if: env.POM_VERSION
#        env:
#          POM_VERSION: ${{ needs.workflow_config.outputs.pom_version }}
#        run: |
#          sed -i "s/version = .*/version = $POM_VERSION/" gradle.properties
#          cat gradle.properties
      - name: Generate artifacts
        run: |
          echo "print gradle.properties"
          cat gradle.properties
          gradle clean build \
            pdfJar \
            teavmZip \
            generateMetadataFileForMavenPublication generatePomFileForMavenPublication \
            -x test
          find . -name "*.jar"
      - name: Sign artifacts
        if: env.ORG_GRADLE_PROJECT_signingKey
        env:
          ORG_GRADLE_PROJECT_signingKey: ${{ secrets.ARTIFACT_SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingPassword: ${{ secrets.ARTIFACT_SIGNING_PASSPHRASE }}
        run: |
          gradle -i signMavenPublication signPdfJar
          ls -l build/libs
          ls -l plantuml-asl/build/libs
          ls -l plantuml-bsd/build/libs
          ls -l plantuml-epl/build/libs
          ls -l plantuml-lgpl/build/libs
          ls -l plantuml-mit/build/libs
          ls -l plantuml-gplv2/build/libs
      - name: Get release version
        id: version
        run: |
          echo "release_version=$(gradle properties -q | grep "version:" | awk '{print $2}')" >> $GITHUB_OUTPUT
      - name: Cache libs
        uses: actions/cache/save@v5
        with:
          path: |
            build/libs
            build/publications
            plantuml-asl/build/libs
            plantuml-bsd/build/libs
            plantuml-epl/build/libs
            plantuml-lgpl/build/libs
            plantuml-mit/build/libs
            plantuml-gplv2/build/libs
          key: "libs-${{ github.run_id }}"
          enableCrossOsArchive: true

      - name: Upload plantuml JAR
        uses: actions/upload-artifact@v7
        with:
          name: plantuml-jar
          path: |
            build/libs/plantuml-*.jar
            !build/libs/plantuml-*-javadoc.jar
            !build/libs/plantuml-*-sources.jar
            !build/libs/plantuml-*-pdf*.jar
          if-no-files-found: error
          retention-days: 30

      - name: Upload js-plantuml ZIP
        uses: actions/upload-artifact@v7
        with:
          name: js-plantuml-zip
          path: build/libs/js-plantuml-*.zip
          if-no-files-found: error
          retention-days: 30

  deploy_site_to_gh_page:
    needs: [ workflow_config, build_artifacts, jdk8 ]
    if: needs.workflow_config.outputs.do_javadoc == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v6

      - name: Set up java
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Download pre-built js-plantuml ZIP
        uses: actions/download-artifact@v8
        with:
          name: js-plantuml-zip
          path: build/libs

      - name: Extract JS files into build/generated/teavm/js
        run: |
          mkdir -p build/generated/teavm/js
          unzip -o build/libs/js-plantuml-*.zip -d build/generated/teavm/js
          echo "Contents of build/generated/teavm/js:"
          ls -la build/generated/teavm/js/

      - name: Build Site for GH Page (without TeaVM rebuild)
        run: gradle siteAssemble

      - name: Deploy Site to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/site


  upload:
    if: |
      needs.workflow_config.outputs.do_release == 'true' ||
      needs.workflow_config.outputs.do_snapshot_release == 'true'
    needs: [ workflow_config, build_artifacts, test_linux, jdk8 ]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v6

      - name: Set up java
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Download Java 8 JAR (built by Ant)
        uses: actions/download-artifact@v8
        with:
          name: plantuml-jdk8-jar
          path: build/java8

      - name: Restore Libs cache
        uses: actions/cache/restore@v5
        with:
          path: |
            build/libs
            build/publications
            plantuml-asl/build/libs
            plantuml-bsd/build/libs
            plantuml-epl/build/libs
            plantuml-lgpl/build/libs
            plantuml-mit/build/libs
            plantuml-gplv2/build/libs
          key: "libs-${{ github.run_id }}"
          fail-on-cache-miss: true
          enableCrossOsArchive: true

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          # Using github.run_number here to reduce confusion when downloading & comparing artifacts from several builds
          name: ${{ github.run_number }}-artifacts
          path: |
            build/libs/*
            build/publications/maven/*
            plantuml-asl/build/libs
            plantuml-bsd/build/libs
            plantuml-epl/build/libs
            plantuml-lgpl/build/libs
            plantuml-mit/build/libs
            plantuml-gplv2/build/libs

      - name: Create snapshot
        if: needs.workflow_config.outputs.do_snapshot_release == 'true'
        env:
          RELEASE_VERSION: ${{ needs.build_artifacts.outputs.RELEASE_VERSION }}
          GITHUB_TOKEN: ${{ github.token }}
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          #do not remove signing key and password or signatures will not be published
          ORG_GRADLE_PROJECT_signingKey: ${{ secrets.ARTIFACT_SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingPassword: ${{ secrets.ARTIFACT_SIGNING_PASSPHRASE }}
        run: |
          echo "print gradle.properties"
          cat gradle.properties
          echo "RELEASE_VERSION=$RELEASE_VERSION"
          .github/scripts/release-snapshot.sh

      - name: Create release in GitHub and OSSRH
        if: needs.workflow_config.outputs.do_release == 'true'
        env:
          RELEASE_VERSION: ${{ needs.build_artifacts.outputs.RELEASE_VERSION }}
          GITHUB_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.ref }}
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          #do not remove signing key and password or signatures will not be published
          ORG_GRADLE_PROJECT_signingKey: ${{ secrets.ARTIFACT_SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingPassword: ${{ secrets.ARTIFACT_SIGNING_PASSPHRASE }}
        run: |
          echo "print gradle.properties"
          cat gradle.properties
          echo "RELEASE_VERSION=$RELEASE_VERSION"
          .github/scripts/release.sh
          gradle --debug publish
          NS="net.sourceforge.plantuml"
          AUTH="$(printf '%s' "$CENTRAL_USERNAME:$CENTRAL_PASSWORD" | base64 | tr -d '\n')"
          curl -fSs -X POST \
            -H "Authorization: Bearer $AUTH" \
            -H "Content-Type: application/json" \
            -d '{"publishing_type":"automatic"}' \
            "https://ossrh-staging-api.central.sonatype.com/manual/upload/defaultRepository/$NS"
          echo "Staging repo transferred to Central Portal - check Publishing -> Deployments."

  push_to_docker_registry:
    needs: [ workflow_config, upload, test_linux ]
    if: needs.workflow_config.outputs.do_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v6
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          # list of Docker images to use as base name for tags
          images: |
            ${{ github.repository }}
            ghcr.io/${{ github.repository }}
          # generate Docker tags based on the following events/attributes
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha
      - name: Log into Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Log in to GitHub Docker Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build/push container image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          build-args: |
            PLANTUML_VERSION=${{ github.event.ref }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64

#  create_native_image_snapshot:
#    needs: [ workflow_config, jdk8 ]
#    if: needs.workflow_config.outputs.do_snapshot_release == 'true'
#    uses: ./.github/workflows/native-image-snapshot.yml
#    secrets: inherit

  create_native_image_release:
    needs: [ workflow_config, upload ]
    if: needs.workflow_config.outputs.do_release == 'true'
    uses: ./.github/workflows/native-image-release.yml
    secrets: inherit

  trigger_plantuml_eclipse_release:
    needs: [ workflow_config, upload, build_artifacts ]
    if: needs.workflow_config.outputs.do_release == 'true'
    #if: needs.workflow_config.outputs.do_release == 'true' || needs.workflow_config.outputs.do_snapshot_release == 'true'
    uses: ./.github/workflows/trigger-plantuml-eclipse-release.yml
    with:
      release-version: ${{ needs.build_artifacts.outputs.release_version }}
      git-ref: ${{ github.ref }}
      git-commit: ${{ github.sha }}
      snapshot: ${{ needs.workflow_config.outputs.do_snapshot_release == 'true' }}
    secrets:
      PLANTUML_ECLIPSE_DISPATCH_TOKEN: ${{ secrets.PLANTUML_ECLIPSE_DISPATCH_TOKEN }}
