name: CI (branch)

on:
  push:
    branches-ignore: [ master ]
    paths-ignore:
      - '**.md'
      - 'docs/**'

defaults:
  run:
    shell: bash

jobs:

  jdk8:
    name: Build & Run with Ant (Java 8)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 8 (Temurin)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '8'

      - name: Ensure Ant present
        run: |
          if ! command -v ant >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y ant
          fi
          ant -version

      - name: Build with Ant
        run: ant -noinput

      - name: Check PlantUML version (expect exit code 16)
        run: |
          set +e
          java -jar plantuml.jar -version
          CODE=$?
          echo "Exit code: $CODE"
          if [ $CODE -ne 16 ]; then
            echo "::error::Unexpected exit code (expected 16, got $CODE)"
            exit 1
          fi

      - name: Run sample diagram test (ASCII)
        run: |
          echo "Alice -> Bob : it works!" | java -jar plantuml.jar -pipe -ttxt

  test_linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v6

      - name: Set up java
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6.1.0

      - name: Diagnostic
        run: .github/scripts/diagnostic.sh

      - name: Build (GPL only) & Test
        run: ./gradlew test -Pfast --no-daemon -i

      - name: Test Summary
        if: always()
        run: .github/scripts/test-summary.sh

      - name: Upload test reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: ${{ github.run_number }}-test-reports
          path: build/reports/tests/

      - name: Upload Vega test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: vega-results
          path: src/test/resources/vega/vega.json
          if-no-files-found: warn
          retention-days: 30
