name: Native Image - Snapshot

on:
  workflow_dispatch:
  workflow_call:

jobs:
  build_windows_amd64:
    name: 'windows-amd64 (snapshot)'
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      - name: Checkout the repository
        uses: actions/checkout@v6

      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: liberica
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: gradle

      - name: Force tmp dir on RUNNER_TEMP for Java
        shell: pwsh
        run: |
          echo "JAVA_TOOL_OPTIONS=-Djava.io.tmpdir=$env:RUNNER_TEMP" >> $env:GITHUB_ENV

      # Native Build Tools 1.1.2 changed its MSVC detection and no longer finds
      # vcvarsall.bat on the windows-2025-vs2026 runner on its own. Initialise the
      # MSVC x64 build environment explicitly so native-image picks up the toolchain.
      - name: Set up MSVC developer environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # --no-daemon: the Gradle daemon would otherwise stay alive after the build
      # and keep the cache .lock files open, which makes setup-graalvm's gradle
      # cache-save step fail with "Device or resource busy" during post-job cleanup.
      - name: Patch build metadata (version / git commit / timestamp)
        shell: pwsh
        run: ./gradlew --no-daemon patchCompilationInfo

      - name: Build native image (plantuml-natif)
        shell: pwsh
        run: ./gradlew --no-daemon :plantuml-natif:nativeCompile -x test

      - name: Run sample diagram test (ASCII)
        shell: pwsh
        run: |
          "Alice -> Bob : it works!" | ./plantuml-natif/build/native/nativeCompile/plantuml.exe -pipe -ttxt

      - name: Archive Windows build
        shell: pwsh
        run: |
          Compress-Archive -Path "plantuml-natif/build/native/nativeCompile/*" -DestinationPath "native-plantuml-windows-amd64-SNAPSHOT.zip"

      - name: Upload build artifact (Windows)
        uses: actions/upload-artifact@v7
        with:
          name: windows-amd64
          path: native-plantuml-windows-amd64-SNAPSHOT.zip

  build_linux_amd64:
    name: 'linux-amd64 (snapshot)'
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout the repository
        uses: actions/checkout@v6

      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: liberica
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: gradle

      - name: Patch build metadata (version / git commit / timestamp)
        run: ./gradlew --no-daemon patchCompilationInfo

      - name: Build native image (plantuml-natif)
        run: ./gradlew --no-daemon :plantuml-natif:nativeCompile -x test

      - name: Run sample diagram test (ASCII)
        run: |
          echo "Alice -> Bob : it works!" | ./plantuml-natif/build/native/nativeCompile/plantuml -pipe -ttxt

      - name: Archive Linux build
        run: |
          zip -j native-plantuml-linux-amd64-SNAPSHOT.zip plantuml-natif/build/native/nativeCompile/*

      - name: Upload build artifact (Linux)
        uses: actions/upload-artifact@v7
        with:
          name: linux-amd64
          path: native-plantuml-linux-amd64-SNAPSHOT.zip

  build_linux_arm64:
    name: 'linux-arm64 (snapshot)'
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 90

    steps:
      - name: Checkout the repository
        uses: actions/checkout@v6

      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: liberica
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: gradle

      - name: Patch build metadata (version / git commit / timestamp)
        run: ./gradlew --no-daemon patchCompilationInfo

      - name: Build native image (plantuml-natif)
        run: ./gradlew --no-daemon :plantuml-natif:nativeCompile -x test

      - name: Run sample diagram test (ASCII)
        run: |
          echo "Alice -> Bob : it works!" | ./plantuml-natif/build/native/nativeCompile/plantuml -pipe -ttxt

      - name: Archive Linux build
        run: |
          zip -j native-plantuml-linux-arm64-SNAPSHOT.zip plantuml-natif/build/native/nativeCompile/*

      - name: Upload build artifact (Linux)
        uses: actions/upload-artifact@v7
        with:
          name: linux-arm64
          path: native-plantuml-linux-arm64-SNAPSHOT.zip

  build_macos_arm64:
    name: 'macos-arm64 (snapshot)'
    runs-on: macos-latest
    timeout-minutes: 90

    steps:
      - name: Checkout the repository
        uses: actions/checkout@v6

      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: liberica
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: gradle

      - name: Patch build metadata (version / git commit / timestamp)
        run: ./gradlew --no-daemon patchCompilationInfo

      - name: Build native image (plantuml-natif)
        run: ./gradlew --no-daemon :plantuml-natif:nativeCompile -x test

      - name: Run sample diagram test (ASCII)
        run: |
          echo "Alice -> Bob : it works!" | ./plantuml-natif/build/native/nativeCompile/plantuml -pipe -ttxt

      - name: Archive macOS build
        run: |
          zip -j native-plantuml-macos-arm64-SNAPSHOT.zip plantuml-natif/build/native/nativeCompile/*

      - name: Upload build artifact (macOS)
        uses: actions/upload-artifact@v7
        with:
          name: macos-arm64
          path: native-plantuml-macos-arm64-SNAPSHOT.zip
