name: Native Image - Snapshot

# Simplified workflow for the 'master-natif' branch.
# Goal: ONLY validate the native compilation of the dedicated `plantuml-natif`
# subproject on Windows x64. No release publishing -- the binaries are just
# uploaded as build artifacts so we can confirm the native-image build succeeds.

on:
  workflow_dispatch:
  push:
    branches:
      - master-natif

jobs:
  build_windows_amd64:
    name: 'Build Native Image windows-amd64'
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      - name: Checkout the repository
        uses: actions/checkout@v6

      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: liberica
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: gradle

      - name: Force tmp dir on RUNNER_TEMP for Java
        shell: pwsh
        run: |
          echo "JAVA_TOOL_OPTIONS=-Djava.io.tmpdir=$env:RUNNER_TEMP" >> $env:GITHUB_ENV

      - name: Patch build metadata (version / git commit / timestamp)
        shell: pwsh
        run: ./gradlew patchCompilationInfo

      - name: Build native image (plantuml-natif)
        shell: pwsh
        run: ./gradlew :plantuml-natif:nativeFullCompile :plantuml-natif:nativeHeadlessCompile -x test

      - name: Archive Windows builds
        shell: pwsh
        run: |
          Compress-Archive -Path "plantuml-natif/build/native/nativeFullCompile/*" -DestinationPath "plantuml-full-windows-amd64-SNAPSHOT.zip"
          Compress-Archive -Path "plantuml-natif/build/native/nativeHeadlessCompile/*" -DestinationPath "plantuml-headless-windows-amd64-SNAPSHOT.zip"

      - name: Upload build artifacts (Windows)
        uses: actions/upload-artifact@v7
        with:
          name: windows-amd64
          path: |
            plantuml-full-windows-amd64-SNAPSHOT.zip
            plantuml-headless-windows-amd64-SNAPSHOT.zip
